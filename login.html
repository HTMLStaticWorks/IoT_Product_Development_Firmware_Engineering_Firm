<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - IoT Engine</title>
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicons -->
    <link rel="icon" type="image/svg\+xml" href="assets/images/favicon.svg">
</head>

<body>
    <!-- Top Right Icons -->
    <div class="auth-top-icons">
        <a href="#" id="theme-toggle" class="btn-icon" title="Toggle Theme"><i class="fa-solid fa-moon"></i></a>
        <a href="#" id="rtl-toggle-nav" class="btn-icon" title="Toggle RTL"><i class="fa-solid fa-right-left"></i></a>
    </div>

    <!-- Auth Section -->
    <section class="auth-section">
        <div class="auth-card premium-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html" class="nav-brand" style="display: inline-block; margin-bottom: 1rem;">
                    <i class="fa-solid fa-microchip"></i>
                    IoT <span>Engine</span>
                </a>

                <h4 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h4>
            </div>
            <form action="#" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="Enter your password"
                            required>
                        <i class="fa-solid fa-eye toggle-password"></i>
                    </div>
                </div>
                <div class="auth-remember-forget">
                    <label
                        style="display: flex; align-items: center; gap: 8px; color: var(--text-secondary); cursor: pointer; font-size: 0.9rem;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="auth-link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <div class="auth-divider">
                <span>OR CONTINUE WITH</span>
            </div>

            <div class="social-auth">
                <button class="btn btn-outline social-btn"><i class="fa-brands fa-google"></i> Google</button>
                <button class="btn btn-outline social-btn"><i class="fa-brands fa-facebook"></i> Facebook</button>
                <button class="btn btn-outline social-btn"><i class="fa-brands fa-apple"></i> Apple</button>
            </div>

            <p class="auth-bottom-text">
                Don't have an account? <a href="register.html" class="auth-link">Sign up</a>
            </p>

        </div>
    </section>

    <!-- Scroll to Top Button -->
    <a href="#" class="scroll-top" id="scrollTop">
        <i class="fa-solid fa-arrow-up"></i>
    </a>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
    <script>
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function () {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                }
            });
        });
    </script>
</body>

</html>
